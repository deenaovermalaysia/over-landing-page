<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROAS Dashboard — Ads Masterlist 2026</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="dashboard-body">

  <!-- Top Navigation -->
  <header class="topbar">
    <div class="topbar-left">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#4f46e5"/>
        <path d="M10 28 L20 12 L30 28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 22 L26 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="topbar-title">Ads Dashboard</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-label">Last updated: <span id="lastUpdated">—</span></span>
      <button class="btn-refresh" id="refreshBtn" onclick="manualRefresh()">
        <svg id="refreshIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Refresh
      </button>
      <form method="POST" action="/logout" style="margin:0">
        <button type="submit" class="btn-logout">Sign Out</button>
      </form>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="dashboard-layout">

    <!-- Sidebar Filters -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <p class="sidebar-heading">Platform</p>
        <div class="platform-tabs">
          <button class="platform-btn active" data-tab="MY">MY Website</button>
          <button class="platform-btn" data-tab="Marketplace">Marketplace</button>
          <button class="platform-btn" data-tab="SG">SG Website</button>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-heading">Month</p>
        <select id="monthFilter" class="select-input">
          <option value="">Loading...</option>
        </select>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-heading">Date Range</p>
        <div class="date-range-wrap">
          <label class="date-label">From Day</label>
          <input type="number" id="dateFrom" class="date-input" min="1" value="1" placeholder="1" />
          <label class="date-label" style="margin-top:8px">To Day</label>
          <input type="number" id="dateTo" class="date-input" min="1" value="31" placeholder="31" />
          <button class="btn-apply-date" id="applyDateBtn">Apply</button>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-heading">Show Products</p>
        <div id="productToggles" class="product-toggles"></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <div id="loadingState" class="state-overlay">
        <div class="spinner"></div>
        <p>Fetching data from Google Sheets...</p>
      </div>
      <div id="errorState" class="state-overlay" style="display:none;">
        <p style="color:#ef4444; font-size:1.1rem;">⚠ Failed to load data</p>
        <p id="errorMsg" style="color:#94a3b8; margin-top:4px;"></p>
        <button class="btn-retry" onclick="loadData()">Retry</button>
      </div>

      <div id="dashboardContent" style="display:none;">

        <!-- Stat Cards -->
        <div class="stat-cards">
          <div class="stat-card">
            <p class="stat-label">Overall Avg ROAS</p>
            <p class="stat-value" id="statAvg">—</p>
            <p class="stat-sub" id="statAvgSub"></p>
          </div>
          <div class="stat-card stat-card--green">
            <p class="stat-label">Top Product</p>
            <p class="stat-value" id="statTop">—</p>
            <p class="stat-sub" id="statTopSub"></p>
          </div>
          <div class="stat-card stat-card--red">
            <p class="stat-label">Lowest Product</p>
            <p class="stat-value" id="statLow">—</p>
            <p class="stat-sub" id="statLowSub"></p>
          </div>
          <div class="stat-card stat-card--purple">
            <p class="stat-label">Active Days</p>
            <p class="stat-value" id="statDays">—</p>
            <p class="stat-sub" id="statDaysSub"></p>
          </div>
        </div>

        <!-- Chart -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Daily ROAS Trend</h2>
            <span class="card-badge" id="chartBadge">—</span>
          </div>
          <div class="chart-wrap">
            <canvas id="roasChart"></canvas>
          </div>
        </div>

        <!-- Bottom Grid -->
        <div class="bottom-grid">

          <!-- Product Table -->
          <div class="card card--table">
            <div class="card-header">
              <h2 class="card-title">Product Performance</h2>
            </div>
            <table class="perf-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Avg ROAS</th>
                  <th>Rating</th>
                </tr>
              </thead>
              <tbody id="perfTableBody"></tbody>
            </table>
          </div>

          <!-- Top/Worst -->
          <div class="rank-col">
            <div class="card">
              <div class="card-header">
                <h2 class="card-title">🏆 Top 5</h2>
              </div>
              <ul class="rank-list" id="top5List"></ul>
            </div>
            <div class="card" style="margin-top:16px;">
              <div class="card-header">
                <h2 class="card-title">⚠ Worst 5</h2>
              </div>
              <ul class="rank-list" id="worst5List"></ul>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
