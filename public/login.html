<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Ads Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="10" fill="#4f46e5"/>
        <path d="M10 28 L20 12 L30 28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 22 L26 22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Ads Dashboard</h1>
    <p class="login-subtitle">Sign in to view your ROAS data</p>

    <!-- Error message -->
    <div id="loginError" class="login-error" style="display:none;">
      Incorrect username or password. Try again.
    </div>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required />
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>

  <script>
    // Show error if redirected back with ?error=1
    if (window.location.search.includes('error=1')) {
      document.getElementById('loginError').style.display = 'block';
    }
  </script>
</body>
</html>
